- id: NOTICE_0003
  issue_type: value_error
  essence: 'MathTex 仅适用于纯数学表达式；当包含非数学内容（中文、自然语言文本、长句、段落或特殊字符）时， LaTeX 引擎无法正确解析，在转换为
    DVI 格式时触发 ValueError。

    '
  root_cause: 'MathTex 对象中混入了不适合 LaTeX 数学模式的内容，导致渲染引擎解析失败。 常见根因包括： 1. 在 MathTex 中直接写入中文文本或
    Unicode 中文字符 2. 在 MathTex 中使用长句、段落式自然语言描述 3. 在 MathTex 中混合数学公式与非数学说明文字 4. 使用了未转义的特殊字符或非标准
    LaTeX 语法 LaTeX 引擎期望纯数学表达式，遇到文本内容时在 dvi 转换阶段抛出 "latex error converting to dvi"
    错误。

    '
  never_do:
  - 在 MathTex 中直接编写中文文本或 Unicode 中文字符
  - 在 MathTex 中使用长句、段落或自然语言描述性内容
  - 在 MathTex 中混合数学符号与自然语言句子（如"设函数 f(x) = x^2"）
  - 在 MathTex 上反复试错字体或宏包来硬容纳自然语言
  - 在数学表达式中使用未转义的特殊字符或非标准 LaTeX 语法
  guardrails:
  - 语义分层原则：数学内容用 MathTex，说明文字和中文内容用 Text
  - 渲染失败后先做内容分类（数学 vs 文本），再决定使用 Text 或 MathTex，而不是继续调整 LaTeX 参数
  - 出现 dvi 转换错误时，优先执行 MathTex -> Text 降级策略
  - 对于中英数混合语句，使用 VGroup 拆分并按基线对齐
  - 渲染前检查 MathTex 内容是否仅包含纯数学表达式
  - 确保 MathTex 遵循标准 LaTeX 数学语法规范
  - 在渲染前通过简单测试验证 LaTeX 代码正确性
  - 确保系统环境中 LaTeX 包和依赖完整可用
  trigger_signals:
  - 运行时抛出 ValueError 异常
  - 错误消息中包含 'latex error converting to dvi' 或类似 LaTeX 转换失败提示
  - LaTeX 日志输出显示编码错误、语法错误、未知命令或转换失败
  - 多次 LaTeX 渲染失败且文本内容包含自然语言或中文
  - 数学渲染失败或显示异常
  preferred_pattern: "核心原则：严格区分数学公式和自然语言文本\n模式1 - 纯文本场景：\n  Text('这是一个中文说明', font=CN_FONT)\n\
    \n模式2 - 纯数学场景：\n  MathTex(r'f(x) = x^2 + 2x + 1')\n\n模式3 - 混合内容场景（推荐）：\n  # 错误做法：MathTex('设函数\
    \ f(x) = x^2')\n  # 正确做法：拆分为 Text + MathTex\n  VGroup(\n      Text('设函数', font=CN_FONT),\n\
    \      MathTex(r'f(x) = x^2')\n  ).arrange(RIGHT)\n\n模式4 - 复杂混排场景：\n  VGroup(\n\
    \      MathTex(r'x_1'),\n      Text('且', font=CN_FONT),\n      MathTex(r'x_2')\n\
    \  ).arrange(RIGHT).align_to(ORIGIN, DOWN)\n\n关键要点： - MathTex 仅用于纯 LaTeX 数学表达式\
    \ - Text 用于所有自然语言、中文、长句和说明性文本 - 混合内容使用 VGroup 组合并对齐\n"
  source: llm
  confidence: 0.85
