  essence: 同名语义参数在不同 API 层可能不兼容，盲用历史参数名会触发冲突。
  root_cause: Manim 当前接口期望 opacity，fill_opacity 不在该方法有效参数集合中。
  never_do:
  - 不查当前版本签名就直接沿用旧参数名。
  guardrails:
  - 调用前先确认目标方法签名。
  - 参数名变更时优先按官方接口对齐。
  trigger_signals:
  - unexpected keyword / 参数被忽略 / 视觉效果未生效
  preferred_pattern: add_background_rectangle(opacity=...)
